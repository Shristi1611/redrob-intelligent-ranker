# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude throughout development of both ranker.py and the Streamlit
  sandbox frontend. For the core ranker, Claude assisted with debugging
  specific issues found through manual data inspection (the consulting-firm
  penalty not firing correctly, the honeypot detection missing experience-
  inconsistent profiles) and with calibrating scoring weights after reviewing
  ranking output against the candidate dataset. The overall scoring design,
  the decision to weight career history above skills, the honeypot pattern,
  and the specific candidates investigated to find these issues, came from
  manual review of the data. For the sandbox, Claude handled page layout,
  styling, the animated hero component, and multipage navigation structure.
  No candidate data was sent to any external API during ranking; the final
  ranker runs entirely offline on pure Python standard library with no
  external models or network calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Career-history-first ranker with five weighted components: career match
  (40%), skills (25%), behavioral availability (20%), experience range (10%),
  and profile quality (5%). Skills are discounted heavily when career history
  shows no corresponding work experience, preventing keyword-stuffed profiles
  from outranking genuinely relevant candidates. Career relevance also gates
  the final score. Honeypot detection cross-validates stated years of
  experience against summed career history duration, catching synthetic
  profiles with internally inconsistent data. Pure Python standard library,
  no external models or network calls. Runtime is approximately 35 seconds
  for 100,000 candidates on CPU.

